name: Publicar imagen docker

on:
    push:
        branches:
            - main

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Desargar el cdgoo del repo
              uses: actions/checkout@v4

            - name: Iniciar sesionen dockerhub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME}}
                password: ${{ secrets.DOCKERHUB_DOCKER}}
            
            - name: Construir y subir
              uses: docker/build-push-action@v7
              with:
                    context: .
                    push: yes
                    tags: ${{ secrets.DOCKERHUB_USERNAME}}/productoms:latest

                

